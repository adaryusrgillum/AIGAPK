name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/AbelInsuranceGroup.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Abel Insurance Group v1.0.0
          body: |
            ## Abel Insurance Group - Android App

            Download and install the APK on your Android device.

            ### Features
            - Personal Insurance catalog (Home, Auto, Life, and more)
            - Business Insurance catalog (Liability, Property, Workers' Comp)
            - Insurance by Industry solutions
            - Company information and mission
            - Client reviews and testimonials
            - Contact form, phone, email, and directions
            - Client portal access
            - Direct call and email integration
          files: release/AbelInsuranceGroup.apk
          draft: false
          prerelease: false
